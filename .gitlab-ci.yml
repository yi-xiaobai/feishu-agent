stages:
  - lint
  - test

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
      - .yarn/cache/

# 语法检查
lint:
  stage: lint
  script:
    - yarn install --frozen-lockfile
    - node --check src/index.js
    - node --check src/services/agent.js
    - node --check src/services/mcp-client.js
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "dev"

# 单元测试
test:
  stage: test
  script:
    - yarn install --frozen-lockfile
    - yarn test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "dev"

# 多版本测试
test:node18:
  extends: test
  variables:
    NODE_VERSION: "18"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
